<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="script.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>The About Page</h1>
      </header>
      <section>
        <form method="post" action="https://webdevbasics.net/scripts/demo.php">
          <div class="mb-3">
            <label for="myName" class="form-label">Name:</label>
            <input type="text" name="myName" id="myName" class="form-control" />
          </div>
          <div class="mb-3">
            <label
              id="emailBox"
              onmouseover="emailMessage()"
              onmouseout="blankMessage()"
              for="myName"
              class="form-label"
              >Email:</label
            >
            <input
              type="text"
              name="myEmail"
              id="myEmail"
              class="form-control"
            />
          </div>
          Choose the browser you use<br />
          <div class="mb-3 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              name="go"
              id="go"
              value="yes"
            />
            <label for="go">Google Chrome</label>
          </div>
          <div class="mb-3 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              name="firefox"
              id="firefox"
              value="yes"
            />
            <label class="form-check-label" for="firefox">Firefox</label>
          </div>
          <div class="mb-3 form-check">
            <input
              type="checkbox"
              class="form-check-input"
              name="edge"
              id="edge"
              value="yes"
            />
            <label class="form-check-label" for="edge">Microsoft Edge</label>
          </div>
          Would you like to be on our mailing list:<br />
          <div class="mb-3">
            <div class="form-check">
              <input
                type="radio"
                name="mailinglist"
                id="mailinglist"
                value="yes"
                class="form-check-input"
              />
              <label class="form-check-label" for="mailinglistyes">Yes</label>
            </div>
            <div>
              <input
                type="radio"
                name="mailinglist"
                id="mailinglist"
                value="yes"
                class="form-check-input"
              />
              <label class="form-check-label" for="mailinglistno">No</label>
            </div>
          </div>
          <div class="mb-3 input-group">
            <span class="input-group-text">Your Comments</span>
            <textarea class="form-control" aria-label="Comments"></textarea>
          </div>
          <input type="submit" class="btn btn-primary" value="submit" />
          <input type="reset" class="btn btn-secondary" />
        </form>
      </section>
    </div>
  </body>
</html>
